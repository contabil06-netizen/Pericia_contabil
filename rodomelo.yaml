    tipo: despesa
    prefixos:
      - "3.2.2.07"   # Impostos, Taxas e Contribuições
                     # 3.2.2.07.005 — Taxas Diversas
                     # 3.2.2.07.007 — Multas de Mora
                     # 3.2.2.07.008 — ICMS Diferencial de Alíquota

  outras_receitas:
