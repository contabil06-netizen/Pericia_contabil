# ------------------------------------------------------------
# ESTRUTURA DA DRE
# Define ORDEM e AGRUPAMENTO de exibição na planilha.
#
# tipo:
#   receita  → exibido positivo, soma ao resultado
#   deducao  → exibido negativo, reduz a receita bruta
#   custo    → exibido negativo, reduz o resultado
#   despesa  → exibido negativo, reduz o resultado
#
# Ordem de apresentação: Receita → Deduções → Custo →
#   Despesas Pessoal → Despesas Gerais → Despesas Financeiras
#   → Impostos/Taxas → Outras Receitas
#
# Prefixos mapeados com base nos balancetes 12/2025 e 01/2026.
# Novos códigos que surgirem em meses futuros dentro dos
# prefixos já declarados serão capturados automaticamente.
# ------------------------------------------------------------
dre_estrutura:

  receita_bruta_servicos:
    label: "Receita Bruta de Prestação de Serviços"
    tipo: receita
    prefixos:
      - "4.1.1.02"   # Receita de Prestação de Serviços
                     # 4.1.1.02.001 — Serviços Prestados
                     # 4.1.1.02.003 — Prestação de Serviços de Transporte

  receita_bruta_mercadorias:
    label: "Receita Bruta de Vendas de Mercadorias"
    tipo: receita
    prefixos:
      - "4.1.1.01"   # Receita Bruta de Vendas e Mercadorias
                     # 4.1.1.01.003 — Venda de Mercadorias (dez/25)

  deducoes_receita:
    label: "(-) Deduções da Receita Bruta"
    tipo: deducao
    prefixos:
      - "4.1.2"      # (-) Deduções da Receita Bruta
                     # 4.1.2.03.008 — (-) Simples Nacional

  custo_mercadorias_vendidas:
    label: "(-) Custo das Mercadorias Vendidas"
    tipo: custo
    prefixos:
      - "5.1"        # Custos dos Produtos e Serviços Vendidos
                     # 5.1.3.01.001 — Custo das Mercadorias Vendidas (dez/25)

  despesas_vendas:
    label: "Despesas com Vendas"
    tipo: despesa
    prefixos:
      - "3.2.1"      # Despesas com Vendas
                     # 3.2.1.06.002 — Manutenção e Reparo (dez/25)

  despesas_pessoal:
    label: "Despesas com Pessoal"
    tipo: despesa
    prefixos:
      - "3.2.2.01"   # Despesas com Pessoal
                     # 3.2.2.01.001 — Salários e Ordenados
                     # 3.2.2.01.002 — Pró-labore
                     # 3.2.2.01.004 — 13º Salário
                     # 3.2.2.01.005 — Férias
                     # 3.2.2.01.007 — FGTS
                     # 3.2.2.01.008 — Indenizações e Aviso Prévio
                     # 3.2.2.01.009 — Assistência Médica e Social
                     # 3.2.2.01.014 — Multa Rescisória (dez/25)

  despesas_gerais:
    label: "Despesas Gerais e Administrativas"
    tipo: despesa
    prefixos:
      - "3.2.2.04"   # Despesas Gerais
                     # 3.2.2.04.005 — Seguros
                     # 3.2.2.04.008 — Assistência Contábil
                     # 3.2.2.04.010 — Depreciações e Amortizações
                     # 3.2.2.04.015 — Combustível e Lubrificantes
                     # 3.2.2.04.016 — Internet
                     # 3.2.2.04.018 — Material de Uso e Consumo
                     # 3.2.2.04.019 — Serviços Prestados por Terceiros
                     # 3.2.2.04.020 — Fretes e Carretos
                     # 3.2.2.04.024 — Serviço de Rastreamento
                     # 3.2.2.04.026 — Contribuição Sindical

  despesas_financeiras:
    label: "Despesas Financeiras"
    tipo: despesa
    prefixos:
      - "3.2.2.05"   # Despesas Financeiras
                     # 3.2.2.05.005 — Juros de Mora
