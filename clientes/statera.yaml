# ------------------------------------------------------------
# ESTRUTURA DA DRE
# Prefixo raiz das contas de resultado: 3
# Ordem: Receita Bruta → Deduções → Custos →
#         Despesas Admin → Despesas Financeiras
# ------------------------------------------------------------
dre_estrutura:

  receita_bruta:
    label: "Receita Bruta de Vendas e Serviços"
    tipo: receita
    prefixos:
      - "3.1.1.1"    # Receita Bruta Operacional
                     # 3.1.1.1.02.00001 — Vendas de Serviços a Prazo

  deducoes_receita:
    label: "(-) Deduções da Receita Bruta"
    tipo: deducao
    prefixos:
      - "3.1.1.3"    # Deduções das Vendas
                     # 3.1.1.3.01.00001 — Cofins s/ Faturamento
                     # 3.1.1.3.01.00009 — CPP
                     # 3.1.1.3.01.00004 — ICMS
                     # 3.1.1.3.01.00006 — PIS s/ Faturamento

  custos_servicos:
    label: "Custos dos Serviços Prestados"
    tipo: custo
    prefixos:
      - "3.1.2.1"    # Custos
                     # 3.1.2.1.02.00028 — (-) Crédito Cofins Não Cumulativo
                     # 3.1.2.1.02.00029 — (-) Crédito ICMS
                     # 3.1.2.1.02.00027 — (-) Crédito PIS Não Cumulativo
                     # 3.1.2.1.02.00018 — Encargos de Depreciação
                     # 3.1.2.1.02.00001 — Material Aplicado
                     # 3.1.2.1.02.00024 — Outros Custos
                     # 3.1.2.1.02.00008 — Prestação Serviços Pessoa Jurídica

  despesas_pessoal:
    label: "Despesas com Pessoal"
    tipo: despesa
    prefixos:
      - "3.1.2.3.01"  # C/pessoal
                      # 3.1.2.3.01.00001 — 13º Salário
                      # 3.1.2.3.01.00003 — Assistência Médica
                      # 3.1.2.3.01.00008 — Férias
                      # 3.1.2.3.01.00009 — FGTS
                      # 3.1.2.3.01.00010 — INSS
                      # 3.1.2.3.01.00011 — Pró-labore
                      # 3.1.2.3.01.00015 — Salários e Ordenados

  despesas_servicos_terceiros:
    label: "Serviços de Terceiros"
    tipo: despesa
    prefixos:
      - "3.1.2.3.02"  # Serviços de Terceiros
                      # 3.1.2.3.02.00003 — Serviços Empresas

  despesas_ocupacao:
    label: "Despesas de Ocupação"
    tipo: despesa
    prefixos:
      - "3.1.2.3.03"  # C/ocupação
                      # 3.1.2.3.03.00002 — Conservação e Reparos

  despesas_servicos_utilidades:
    label: "Serviços e Utilidades"
    tipo: despesa
    prefixos:
      - "3.1.2.3.04"  # Serviços e Utilidades
                      # 3.1.2.3.04.00001 — Água e Luz
                      # 3.1.2.3.04.00006 — Seguro
                      # 3.1.2.3.04.00007 — Telefones

  despesas_servicos_profissionais:
    label: "Serviços Profissionais e Contábeis"
    tipo: despesa
    prefixos:
      - "3.1.2.3.06"  # Serviços Profissionais e Contratuais
                      # 3.1.2.3.06.00001 — Assessoria Contábil e Fiscal

  despesas_gerais:
    label: "Despesas Gerais Administrativas"
    tipo: despesa
    prefixos:
      - "3.1.2.3.08"  # Despesas Gerais
                      # 3.1.2.3.08.00001 — Associações e Sindicatos
                      # 3.1.2.3.08.00007 — Depreciações e Amortizações
                      # 3.1.2.3.08.00019 — Processamento de Dados

  despesas_financeiras:
    label: "Despesas Financeiras"
    tipo: despesa
    prefixos:
      - "3.1.3"       # Financeiras Líquidas
                      # 3.1.3.1.01.00001 — Comissões e Despesas Bancárias
                      # 3.1.3.1.01.00005 — Juros de Mora
