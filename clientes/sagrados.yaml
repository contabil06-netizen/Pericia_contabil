# ============================================================
# MAPA DE CONTAS — SAGRADOS CORACOES INDUSTRIA COM. ALIMENTOS LTDA
# CNPJ: 65.123.804/0001-23
# Layout: CTC007 (sistema proprio, 9 colunas, codigo hierarquico)
# Setor: Agroindustrial - Cafe (Matriz + Filial)
# Status: Recuperacao Judicial (RJ) — integra o GRUPO SAGRADOS
#         (demais CNPJs do grupo ainda sem YAML proprio)
#
# Reconciliado linha a linha contra:
#   - BALANCETE ANALITICO - SAGRADOS FEVEREIRO 2026.pdf
#   - BALANCETE ANALITICO - SAGRADOS JANEIRO 2026.pdf
# Todos os grupos do Balanco batem ate o centavo com o RMA
# comparativo fev-26/jan-26 fornecido (ver [V1] abaixo).
# ============================================================
#
# PARTICULARIDADES DO BALANCETE SAGRADOS (CTC007):
#   1. Colunas: Conta | C.Res | C.C | D/C | Nome | Saldo Anterior |
#      Total Debito | Total Credito | Mov. Mensal | Saldo Atual
#   2. Grupo 1 = Ativo, Grupo 2 = Passivo, Grupo 3 = Receitas,
#      Grupo 4 = Despesas/Custos (grupo 5 nao usado neste cliente)
#   3. Balancete SEM ENCERRAMENTO: contas de resultado (grupo 3/4)
#      nao sao transferidas ao PL mensalmente — CLAUDE.md, secao
#      "Balanco sem encerramento"
#   4. Resultado do Periodo no BP e calculado pelo exporter
#      (_construir_bp_yaml, linha "Resultado do Periodo"), NAO por
#      um grupo YAML — nao mapear "Resultado do Exercicio" aqui
#   5. RMA usa MOV. MENSAL para a coluna "Resultado Mensal" da DRE
#      e SALDO ATUAL para a coluna "Resultado Acumulado"
#   6. O exporter gera UMA LINHA POR CHAVE do dicionario "balanco"
#      (core/exporter.py::_construir_bp_yaml) — grupos que devem
#      aparecer como uma unica linha no RMA precisam estar
#      consolidados em uma unica chave aqui (ver Adiantamentos e
#      Obrigacoes Trabalhistas abaixo)
#
# ============================================================
# CHECKLIST DE VALIDACAO PARA O COWORK
# ============================================================
#
# [V1] EQUACAO PATRIMONIAL (balancete sem encerramento — CLAUDE.md)
#      Ativo = Passivo + PL + Resultado do Periodo (acumulado)
#      fev-26: Ativo 42.401.897,31 = PC 3.814.465,85 + PNC 228.272.456,43
#              + PL -188.307.562,23 + Result.Acum -1.377.463,xx  (dif < R$1)
#      jan-26: Ativo 42.556.063,18 = PC 3.747.355,36 + PNC 227.761.344,25
#              + PL -188.307.562,23 + Result.Acum -645.074,xx    (dif < R$1)
#
# [V2] PARTIDAS DOBRADAS
#      "Contas devedoras" == "Contas credoras" no rodape do PDF
#      fev-26: 42.820.865,91 = 42.820.865,91
#
# [V3] ADIANTAMENTOS — grupo unico (2 contas somadas)
#      1.1.02.02 (Fornecedores) + 1.1.02.03 (Funcionarios)
#      fev-26: 6.230.423,64 + 3.860,12 = 6.234.283,76 (RMA: 6.234.284)
#      jan-26: 6.217.890,15 + 8.737,95 = 6.226.628,10 (RMA: 6.226.628)
#
# [V4] OBRIGACOES TRABALHISTAS — grupo unico (4 contas somadas)
#      2.1.05 + 2.1.06 + 2.1.09 (provisoes ferias/13o/INSS/FGTS) + 2.1.11
#      fev-26: 70.730,01+28.389,87+115.588,76+356.999,62 = 571.708,26 (RMA: 571.708)
#      jan-26: 72.715,81+25.863,58+116.606,93+268.455,62 = 483.641,94 (RMA: 483.642)
#
# [V5] EMPRESTIMOS E FINANCIAMENTOS LP — grupo unico (2 contas somadas)
#      2.2.02 (Outras Obrig. NC + Mutuo) + 2.2.10 (Instituicoes Financeiras)
#      fev-26: 328.803,53 + 226.992.955,98 = 227.321.759,51 (RMA: 227.321.760)
#      jan-26: 306.691,00 + 226.503.956,33 = 226.810.647,33 (RMA: 226.810.647)
#
# [V6] FUNRURAL SOB JUDICE (passivo) x DEPOSITO JUDICIAL FUNRURAL (ativo)
#      Sao DUAS contas distintas com saldo semelhante — nao confundir:
#      - 2.2.01 (Passivo NC) = provisao do debito Funrural discutido = 950.696,92
#      - 1.2.01.04.001 (Ativo NC, dentro de 1.2.01.04 Depositos Judiciais)
#        = deposito judicial dado em garantia = 950.696,92
#      Valores coincidem porque o deposito foi feito no valor integral
#      do debito sub judice — confirmar com o AJ se ainda procede.
#
# [V7] CONTAS NOVAS NAO MAPEADAS
#      Se o balancete de um mes futuro contiver prefixos 1.x/2.x fora
#      dos listados abaixo, reportar ao perito: codigo, descricao,
#      saldo e grupo sugerido — nao descartar silenciosamente.
#
# [V8] ANOMALIA CONHECIDA — Linha "09. Depreciacao/Amortizacao" da DRE
#      No RMA fornecido, fev-26 e jan-26 mostram o MESMO valor (47.190)
#      tanto na coluna mensal quanto na acumulada. Reconciliando com o
#      balancete bruto:
#        fev-26 (mov. mensal): 4.1.02.01.024 (47.153,67) + 4.1.02.01.038
#          (2.159,84) + 4.8.12.01.024 (0,00, integralmente revertido) = 49.313,51
#        jan-26 (mov. mensal): 47.165,93 + 2.159,84 + 0,00 = 49.325,77
#      Nenhuma combinacao dos codigos abaixo reproduz 47.190 em nenhum
#      dos dois meses, e o fato de MENSAL == ACUMULADO em ambos os
#      periodos e tipico de referencia de celula fixa/cross-sheet
#      (mesmo padrao de bug ja documentado para outro cliente na
#      memoria do projeto). O EBITDA do RMA tambem nao fecha com
#      "Resultado Operacional + Depreciacao" usando nenhum dos dois
#      valores acima. Suspeita: bug no exporter (celula de depreciacao
#      nao atualiza entre periodos), NAO erro de mapeamento YAML.
#      Os prefixos abaixo mantêm a base contabil correta; NAO ajustar
#      para forcar o valor 47.190 sem confirmar a causa raiz no codigo.
#
# ============================================================

