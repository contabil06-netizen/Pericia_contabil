# ============================================================
# MAPA DE CONTAS - FRIGORIFICO TAMOYO LTDA
# CNPJ: 20.395.778/0001-54
# Layout: Socium (codigo hierarquico 5 niveis)
# Gerado com base nos balancetes 12/2025, 01/2026, 02/2026,
#   03/2026 e 04/2026
# Setor: Frigorifico / Agroindustrial - Recuperacao Judicial
# Observacao: empresa com atividade reduzida (sem clientes a receber);
#   receitas por prestacao de servicos e arrendamento; passivo fortemente
#   composto por obrigacoes em recuperacao judicial.
#   Estoque (1.1.5) aparece em 02/2026 com saldo zero - mapeado por precaucao.
#   Receitas Financeiras (4.1.3) e Custo de Produtos (5.1.1) aparecem
#   pontualmente em 02/2026 com saldos imateriais.
# ============================================================

cliente: "Frigorifico Tamoyo Ltda"
cnpj: "20.395.778/0001-54"
layout: "socium"

# ------------------------------------------------------------
# BALANCO PATRIMONIAL
# ------------------------------------------------------------
balanco:

  ativo_circulante:

    disponibilidades:
      # 1.1.1.01.001 - Caixa Geral
      # 1.1.1.01.002 - Caixa Diversos
      # 1.1.1.01.003 - Caixa Sarti Mineracao
      codigos: ["1.1.1"]

    estoques:
      # 1.1.5.01.000 - Materia-Prima (saldo zero em 02/2026)
      codigos: ["1.1.5"]

    outros_creditos:
      # 1.1.3.05 - Adiantamentos a Fornecedores
      # 1.1.3.06 - Adiantamento a Empregados
      # 1.1.3.08 - Tributos a Recuperar/Compensar
      codigos: ["1.1.3"]

    contas_compensacao_ativo:
      # 1.4.1.01.001 - Entradas para Industrializacao
      # 1.4.1.01.003 - Remessa p/ Conserto
      # 1.4.1.01.005 - Entrada p/Ind. s/Transito
      codigos: ["1.4"]

  ativo_nao_circulante:

    realizavel_longo_prazo:
      # 1.2.1.03.000 - Depositos Judiciais Trabalhistas
      codigos: ["1.2.1"]

    investimentos:
      # 1.2.3.01.000 - Investimento em Acoes
      codigos: ["1.2.3"]

    imobilizado:
      # 1.2.4.01.000 - Terrenos
      # 1.2.4.02.000 - Moveis e Utensilios
      # 1.2.4.03.000 - Maquinas e Equipamentos
      # 1.2.4.07.000 - (-) Depreciacoes Acumuladas (3 grupos)
      # 1.2.4.08.000 - Outros Imobilizados
      codigos: ["1.2.4"]

    intangivel:
      # 1.2.5.02.000 - Pesq. Minerais, Cultura de Eucalipto
      codigos: ["1.2.5"]

  passivo_circulante:

    emprestimos_financiamentos:
      # 2.1.1.01.000 - Emprestimos a Terceiros
      codigos: ["2.1.1"]

    fornecedores:
      # 2.1.3.01 - Fornecedores (diversas empresas)
      codigos: ["2.1.3"]

    obrigacoes_tributarias:
      # 2.1.4.01.000-.003 - ICMS, ISS, IRPJ, CSLL, IRRF, PIS, COFINS,
      #   CRF, DIFAL, INSS Rec. Bruta, PIS/COFINS/CSLL Retidos, CFEM
      codigos: ["2.1.4"]

    obrigacoes_trabalhistas:
      # 2.1.5.01.000 - Salarios e Ordenados a Pagar
      # 2.1.5.02.000 - INSS, FGTS, Contrib. Sindical, Contrib. Previd.
      codigos: ["2.1.5"]

    outras_obrigacoes:
      # 2.1.6.02.000 - Contas a Pagar diversas
      # 2.1.6.06.001-.007 - Multas, Parcelamentos RJ
      codigos: ["2.1.6"]

  passivo_nao_circulante:

    emprestimos_financiamentos_lp:
      # 2.2.1.01.001 - Emprestimo Banco CDMG / Adolfo Henrique S. Franco
      codigos: ["2.2.1.01"]

    impostos_parcelados_rj:
      # 2.2.1.05.001-.010 - Parcelamentos ICMS, Divida Ativa, COFINS, PIS
      codigos: ["2.2.1.05"]

    trabalhistas_parcelados_rj:
      # 2.2.1.06.001-.004 - Parcelamentos INSS, FGTS, CLT, IRRF
      codigos: ["2.2.1.06"]

  patrimonio_liquido:

    capital_social:
      # 2.3.1.01.000 - Capital Social (2 socios)
      codigos: ["2.3.1"]

    reserva_reavaliacao:
      # 2.3.3.02 - Reavaliacao de Ativos Proprios
      codigos: ["2.3.3"]

    reservas_lucros:
      # 2.3.4.06 - Reserva Legal
      # 2.3.5.01.000 - Lucros Acumulados
      codigos: ["2.3.4", "2.3.5"]

    prejuizos_acumulados:
      # 2.3.6.01.001 - (-) Prejuizos Acumulados
      # 2.3.6.01.002 - (-) Prejuizo do Periodo (pode ser credor = lucro parcial)
      codigos: ["2.3.6"]
      sinal: -1

    ajustes_exercicios:
      # 2.3.8.01.000 - Ajustes de Exercicios Ant. Ref. a Desoneracao
      codigos: ["2.3.8"]

  resultado_exercicios_futuros:

    compensacao_passivo:
      # 2.5.0.01.001/003/005 - Retorno remessas (contrapartida de 1.4)
      codigos: ["2.4", "2.5"]


# ------------------------------------------------------------
# ESTRUTURA DA DRE
# tipo: receita | deducao | custo | despesa | outra_receita
#
# Depreciacoes (3.2.2.04.001) incluidas em despesas_gerais.
# NAO separadas como tipo:depreciacao pois o codigo 3.2.2.04.001
# e compartilhado com "Material de Uso e Consumo" no Socium.
# ------------------------------------------------------------
dre_estrutura:

  receita_servicos:
    label: "Receita Bruta de Prestacao de Servicos"
    tipo: receita
    prefixos:
      - "4.1.1.02"   # 4.1.1.02.000 - Servicos Prestados

  deducoes_receita:
    label: "(-) Deducoes da Receita Bruta"
    tipo: deducao
    prefixos:
      - "4.1.2"      # 4.1.2.03.000 - (-) ICMS

  custo_produtos_vendidos:
    label: "(-) Custo dos Produtos Vendidos"
    tipo: custo
    prefixos:
      - "5.1.1"      # 5.1.1.01.000 - Custos dos Produtos (02/2026, R$215,60)

  despesas_pessoal:
    label: "Despesas com Pessoal"
    tipo: despesa
    prefixos:
      - "3.2.2.01"   # Salarios, Ferias, INSS, FGTS, Vale Transp./Alim.

  impostos_taxas:
    label: "Impostos, Taxas e Contribuicoes"
    tipo: despesa
    prefixos:
      - "3.2.2.03"   # Taxas Diversas, Multas, IMA, ANM, Custas Judiciais

  despesas_gerais:
    label: "Despesas Gerais e Administrativas"
    tipo: despesa
    prefixos:
      - "3.2.2.04"   # Energia Eletrica, Deprec./Amort. + Mat. Consumo, Assoc.

  despesas_comunicacao:
    label: "Despesas com Comunicacao"
    tipo: despesa
    prefixos:
      - "3.2.2.05"   # Telefone, Internet

  despesas_terceiros:
    label: "Servicos de Terceiros e Honorarios"
    tipo: despesa
    prefixos:
      - "3.2.2.06"   # Contabilidade, Advogados, Terceiros, Engenharia, Manutencao

  despesas_financeiras:
    label: "Despesas Financeiras"
    tipo: despesa
    prefixos:
      - "3.2.2.08"   # 3.2.2.08.009 - Juros s/ Impostos

  receitas_financeiras:
    label: "Receitas Financeiras"
    tipo: outra_receita
    prefixos:
      - "4.1.3"      # 4.1.3.01.000 - Descontos Financeiros Obtidos (02/2026)

  recuperacao_despesas:
    label: "Recuperacao de Despesas"
    tipo: outra_receita
    prefixos:
      - "4.1.4"      # 4.1.4.00.001 - Recuperacao de Despesa

  outras_receitas:
    label: "Outras Receitas Operacionais"
    tipo: outra_receita
    prefixos:
      - "4.1.5"      # 4.1.5.01.000 - Arrendamentos
