# Layout: contacerta
# Gerado com base nos balancetes 02/2026, 03/2026 e 04/2026
# Grupo: Grupo Carolina Ribeiro (PF + PJ)
# Setor: Produtora Rural / Agropecuária (soja, milho, semente)
#
# OBSERVAÇÕES CONTÁBEIS:
#   - Produtora rural pessoa física: isenta de PIS/COFINS sobre
#     receita de venda de produção rural (sem linha 02 de deduções)
#   - Disponibilidades NEGATIVAS: caixa físico ~R$39k (D) mas
#     Banco Sicoob ~R$102k (C) = cheque especial → net -R$63k (C)
#   - Imobilizado expressivo (R$21,52M): terrenos, imóveis rurais,
#     máquinas agrícolas, veículos — SEM depreciação acumulada no
#     balancete (linha 09 = R$0)
#   - Adiantamentos Intercompany PF→PJ [392]: conta-corrente interna
#     com a PJ (R$1,091M em 04/26); espelho de [26286] no PJ Passivo LP
#   - PL crescente: Lucros Acumulados [1848] R$18,46M vs Prejuízo
#     do Exercício [1890] crescendo (R$2,08M→R$2,83M→apurado em dez)
#   - Ajustes de Exercícios Anteriores [1803]: R$7,57M — reavaliação
#     de ativos incorporada ao PL sem ser pelo resultado do exercício
#
# ATENÇÃO — Layout ContaCerta (bracket IDs):
#   Os códigos são IDs numéricos internos entre colchetes ([21], [854]).
#   NÃO formam hierarquia por prefixo — "18" não é pai de "189".
#   O engine deve usar os sintéticos como CORRESPONDÊNCIA EXATA,
#   capturando o saldo já agregado do grupo hierárquico.
#   Para DRE (prefixos), o match é efetivamente exato pois filhos
#   não compartilham os dígitos iniciais do pai.
# ============================================================

cliente: "Carolina Ribeiro da Silva"
cpf: "099.365.276-07"
layout: "contacerta"
grupo: "Grupo Carolina Ribeiro"

# ------------------------------------------------------------
# BALANÇO PATRIMONIAL
# Cada `codigos` aponta para o ID SINTÉTICO do grupo.
# O engine usa correspondência EXATA (não prefixo) para
# capturar o saldo agregado de todos os filhos analíticos.
