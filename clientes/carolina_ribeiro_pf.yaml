balanco:

  ativo_circulante:

    disponibilidades:
      label: "Caixa e Equivalentes de Caixa"
      # [21] CAIXA E EQUIVALENTES DE CAIXA  (saldo CREDOR em todos os períodos)
      #   [28] NUMERÁRIOS
      #     [35] CAIXA
      #       [42]  Caixa: R$38.952,41D
      #       [10263] Compra de Rebanho: R$138,00D (conta transitória)
      #   [49] BANCOS
      #     [56] BANCOS CONTA MOVIMENTO
      #       [77]  Banco Bradesco S.A.: saldo zero (02/26) / zero (03/26 em diante)
      #       [2180] Banco Unicred: R$0 (02/26 tem saldo residual; zero nos demais)
      #       [106]  Banco Sicoob Noroeste de Minas: R$102.704,81C (cheque especial)
      # Saldo: R$63.614,40C (negativo = saque a descoberto líquido)
      codigos: ["21"]

    clientes:
      label: "Clientes (Recebíveis)"
      # [18807] RECEBÍVEIS
      #   [203] DUPLICATAS A RECEBER
      #     [9394] COOPERATIVA AGRICOLA DE UNAI LTDA: R$10.983,91D (estável)
      codigos: ["18807"]

    adiantamentos_intercompany:
      label: "Adiantamentos Intercompany PF→PJ"
      # [392] ADIANTAMENTO E EMPRÉSTIMO
      #   [427] EMPRÉSTIMOS
      #     [26069] CAROLINA RIBEIRO DA SILVA LTDA (conta-corrente intercompany PF→PJ)
      # Saldo flutuante: R$273k(02)→R$388k(03)→R$1.091k(04) conforme mútuo
      # Espelho: PJ Passivo LP [26286] = mesmos valores
      codigos: ["392"]

    impostos_a_recuperar:
      label: "Impostos a Recuperar (IRRF)"
      # [483] OUTROS CRÉDITOS
      #   [490] IMPOSTOS A RECUPERAR
      #     [497] FEDERAIS E ESTADUAIS
      #       [5771] IRRF a Recuperar: R$16.357,25D (estável)
      codigos: ["483"]

  ativo_nao_circulante:

    investimentos:
      label: "Investimentos (Consórcios)"
      # [833] INVESTIMENTOS
      #   [3402] Consorcios
      #     [7956] Consorcios Bradesco SA: R$50.387,84D (estável)
      codigos: ["833"]

    imobilizado:
      label: "Imobilizado"
      # [854] IMOBILIZADO
      #   [861] BENS MÓVEIS E IMÓVEIS  (R$21.524.276,88D — estável nos 3 meses)
      #     [868]  Terrenos e Imóveis:            R$5.030.000,00D
      #     [889]  Veículos:                      R$853.483,00D
      #     [910]  Máquinas e Equipamentos:        R$8.010.378,88D
      #       [10595] Pulverizador Autopropelido:  R$1.107.228,00D
      #       [3756]  Colheitadeira de Graos:      R$620.486,00D
      #       [3763]  Plataforma Corte de Graos:   R$178.006,00D
      #       [4533]  Plantadeira:                 R$198.543,00D
      #       [22793] Graneleira:                  R$49.132,00D
      #       [22835] Caminhão:                    R$184.020,00D
      #     [2725] Imóveis Rurais:                R$5.293.000,00D
      # Nota: SEM conta de depreciação acumulada no plano de contas PF.
      codigos: ["854"]

  passivo_circulante:

    fornecedores:
      label: "Fornecedores"
      # [1036] FORNECEDORES  (R$3.391.352,65C — estável nos 3 meses)
      #   Principais credores (insumos agrícolas):
      #   [7015]  AGROPAULISTA COM. REP. PROD. AGR. UNAI:  R$69.181,50C
      #   [7127]  COOPERATIVA AGRICOLA DE UNAI:             R$18.300,00C
      #   [7211]  TARUMA AGROCOMERCIAL:                     R$433.326,40C
      #   [22751] SINOVA INOVAÇÕES AGRICOLAS:               R$284.943,37C
      #   [22758] TERRA DO BRASIL P. AGROPE. (BURITIS):     R$686.279,99C
      #   [2256]  PROTEC PRODUTOS AGRICOLAS:               R$1.429.263,10C
      #   e outros (Pivot, Inquima, Centro-Oeste, Tche, Mapfre, Bradesco Auto)
      codigos: ["1036"]

  passivo_nao_circulante:

    emprestimos_financiamentos:
      label: "Empréstimos e Financiamentos"
      # [1470] S EMPRÉSTIMOS E FINANCIAMENTOS (saldo já agregado pelo ContaCerta)
      #   [1491] EMPRÉSTIMOS BANCÁRIOS:
      #     [113] Emprestimo Banco Sicoob Noroeste de Minas: R$1.088.857,33C
      #   [1554] FINANCIAMENTOS:
      #     [3721]  Banco Volkswagen:              R$146.099,59C
      #     [1752]  Banco Bradesco Financiamentos: R$323.836,85C
      #     [22828] Banco CNH Industrial Capital:  R$1.434.476,39C
