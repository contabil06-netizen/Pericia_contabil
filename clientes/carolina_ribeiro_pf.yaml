      codigos: ["1470"]

  patrimonio_liquido:

    lucros_acumulados:
      label: "Lucros Acumulados"
      # [1848] LUCROS ACUMULADOS  (R$18.462.981,15C — estável)
      #   [1855] LUCROS NO EXERCÍCIO
      #     [1862] Lucros no Exercício: R$10.425.233,96C
      #   [1869] LUCROS DE EXERCÍCIO ANTERIORES: R$8.037.747,19C
      #     [1876] Lucros Acumulados: R$469.064,87C
      #     [1803] Ajustes de exercicios anteriores: R$7.568.682,32C
      codigos: ["1848"]

    prejuizos_acumulados:
      label: "(-) Prejuízo Acumulado"
      # [1890] (-) PREJUIZO ACUMULADO
      #   [1897] (-) PREJUÍZO DO EXERCÍCIO
      #     [1904] (-) Prejuízo do Exercício (devedor, cresce: R$2,08M→R$2,83M)
      # Sinal -1: conta DEVEDORA reduz o PL
      # PL líquido = R$18.462.981,15C - R$2.829.187,97D = R$15.633.793,18C ✓
      codigos: ["1890"]
      sinal: -1


# ------------------------------------------------------------
# ESTRUTURA DA DRE — FORMATO PADRÃO 14 LINHAS
#
# Layout ContaCerta: prefixos = IDs sintéticos dos grupos.
# Match é efetivamente exato — filhos não compartilham
# dígitos iniciais com o pai (ex: pai=2625, filhos=2632,2849,2870).
#
# PARTICULARIDADE PF PRODUTORA RURAL:
#   - Sem PIS/COFINS sobre venda de produção própria → Linha 02 vazia
#   - Custo com pessoal classificado como CUSTO (04.1), não despesa
#   - Sem depreciação no balancete → Linha 09 = R$0
#   - DRE acumulada (Saldo Atual = YTD em todos os meses)
# ------------------------------------------------------------
dre_estrutura:

  # ── 01. Receita Bruta ────────────────────────────────────
  receita_bruta:
    label: "Receita Bruta"
    tipo: agrupador
    subgrupos:
      receita_vendas_agro:
        label: "Receita de Vendas Agropecuárias"
        tipo: receita
        prefixos:
          - "1946"   # [1946] RECEITA DE VENDAS → [1953] RECEITA DE VENDAS
                     #   [2831] Receita venda de milho pj
                     #   [2838] Receita venda de soja pj   ← principal (R$1,62M em 04/26)
                     #   [4638] Receita venda semente milho pj
                     # YTD 04/2026: R$1.656.712,90C

  # ── 02. Deduções da Receita Bruta ────────────────────────
  deducoes_receita:
    label: "(-) Deduções da Receita Bruta"
    tipo: deducao
    prefixos: []   # PF produtora rural: isenta de PIS/COFINS sobre vendas

  # ── 03. Receita Operacional Líquida ──────────────────────
  receita_operacional_liquida:
    label: "Receita Operacional Líquida"
    tipo: subtotal
    formula: "receita - deducao"

  # ── 04. Custo Operacional ────────────────────────────────
  custo_operacional:
    label: "Custo Operacional"
    tipo: agrupador
    subgrupos:
      custo_pessoal_producao:
        label: "Custo com Pessoal de Produção"
        tipo: custo
        prefixos:
          - "2128"   # [2128] CUSTO DE BENS E SERVIÇOS = [2135] CUSTO FABRIL
                     #   [2184] GASTOS C/PESSOAL
                     #     [2191] GASTOS C/PESSOAL FABRICAÇÃO
                     #       [2198] Salarios e Ordenados
                     #       [2212] Rescisao Trabalhista (apenas 02/26)
                     #       [2219] Despesas c/INSS
                     #       [2226] Despesas c/FGTS
                     # YTD 04/2026: R$124.333,55D

  # ── 05. Lucro (Prejuízo) Bruto ───────────────────────────
  lucro_bruto:
    label: "Lucro (Prejuízo) Bruto"
    tipo: subtotal
    formula: "receita - deducao - custo"

  # ── 06. Despesas Operacionais ────────────────────────────
  despesas_operacionais:
    label: "Despesas Operacionais"
    tipo: agrupador
    subgrupos:
      despesas_pessoal_adm:
        label: "Despesas com Pessoal (Adm)"
        tipo: despesa
        prefixos:
          - "2485"   # [2485] DESPESAS C/PESSOAL
                     #   [2492] DESPESAS COM PESSOAL
                     #     [2597] Uniformes: R$759,00D (somente em 02/26, saldo zero após)
                     # ATENÇÃO: conta DORMANTE — existe somente em 02/26 (saldo zero
                     # ao fechamento). Ausente em 03/26 e 04/26. PERITUS deve
                     # retornar zero ao não localizar o código — sem erro fatal.
      adm_gerais:
        label: "Administrativas e Gerais"
        tipo: despesa
        prefixos:
          - "2625"   # [2625] ADMINISTRATIVAS E GERAIS
                     #   [2632] DESPESAS GERAIS:
                     #     [2646] Energia Elétrica, [2653] Telefone
                     #     [2681] Combustíveis e Lubrificantes (expressivo)
                     #     [2716] Conservação do Imobilizado
                     #     [2723] Fretes e Carretos, [2737] Manutenção Sistemas
                     #     [2793] Sindicatos e Associações, [2800] Seguros
                     #     [3346] Internet, [4522] Ração p/Gado
                     #     [2712] Fertilizantes (expressivo: R$249k em 04/26)
                     #     [8915] Material de EPI
                     #     [9566] Desp.c/Maquinas e Equip., [5687] Despesas Diversas
                     #     [19090] Despesas c/Cantina, [19097] Consultoria Agrícola
                     #     [19615] IPVA (aparece em 04/26), [21806] Despesas c/Armazem
                     #   [2849] SERVIÇOS PRESTADOS POR TERCEIROS-PF:
                     #     [2856] Assistência Contábil e Fiscal
                     #     [10344] Assistência em Segurança do Trabalho
                     #     [11246] Assistencia Veterinaria (a partir de 03/26)
                     #   [2870] SERVIÇOS PRESTADOS POR TERCEIROS-PJ:
                     #     [10021] Serviço analises/exames tecnicos de solo (04/26)
                     #     [5022]  Assistência Contábil e Fiscal
                     #     [25712] Honorários Advocatícios (expressivo: ~R$68k em 04/26)
                     #     [25719] Despesas com consulta medica
                     # YTD 04/2026: R$919.440,80D
      tributarias:
        label: "Tributárias"
        tipo: tributaria
        prefixos:
          - "9461"   # [9461] Impostos e Taxas  ← CONTA FOLHA (leaf)
                     #   Hierarquia: [2940]DESPESAS TRIBUTÁRIAS → [2947]TRIBUTOS FEDERAIS → [9461]
                     #   PERITUS lê contas folha; IDs pai [2940]/[2947] retornam zero.
                     #   Valores: R$2.093,26D (03/26 YTD) | R$1.910,94D (movto abr/26)
                     #            R$4.004,20D (04/26 YTD acumulado)

  # ── 07. Outras Receitas (Despesas) Operacionais ──────────
  outras_receitas_despesas:
    label: "Outras Receitas (Despesas) Operacionais"
    tipo: agrupador
    subgrupos:
      outras_receitas:
        label: "Outras Receitas"
        tipo: outra_receita
        prefixos: []
      outras_despesas:
        label: "Outras Despesas"
        tipo: outra_despesa
        prefixos: []

  # ── 08. Resultado Operacional ────────────────────────────
  resultado_operacional:
    label: "Resultado Operacional"
    tipo: subtotal
    formula: "receita - deducao - custo - despesa - tributaria + outra_receita - outra_despesa"

  # ── 09. Depreciação / Amortização (addback p/ EBITDA) ────
  depreciacao_amortizacao:
    label: "Depreciação / Amortização"
    tipo: depreciacao
    prefixos: []   # PF não registra depreciação no balancete — linha informativa (R$0)

  # ── 10. EBITDA ───────────────────────────────────────────
  ebitda:
    label: "EBITDA"
    tipo: subtotal
    formula: "receita - deducao - custo - despesa + outra_receita - outra_despesa + depreciacao"

  # ── 11. Receitas (Despesas) Financeiras ──────────────────
  financeiras:
    label: "Receitas (Despesas) Financeiras"
    tipo: agrupador
    subgrupos:
      receitas_financeiras:
        label: "Receitas Financeiras"
        tipo: receita_financeira
        prefixos:
          - "2037"   # [2037] Receitas Diversas  ← CONTA FOLHA (leaf)
                     #   Hierarquia: [2009]RECEITAS FINANCEIRAS E OUTRAS → [2016] → [2037]
                     #   PERITUS lê contas folha; IDs pai [2009]/[2016] retornam zero.
                     #   Valores: R$1.711,23C (03/26 YTD) | R$1.440,00C (movto abr/26)
                     #            R$3.151,23C (04/26 YTD acumulado)
      despesas_financeiras:
        label: "Despesas Financeiras"
        tipo: despesa_financeira
        prefixos:
          - "2884"   # [2884] DESPESAS FINANCEIRAS
                     #   [2891] FINANCEIRAS
                     #     [2898] Despesas Bancárias: R$170,00D
                     #     [5694] IOF: R$597,02D
                     # YTD 04/2026: R$767,02D

  # ── 12. Lucro (Prejuízo) Antes do IRPJ e CSLL ───────────
  antes_irpj:
    label: "Lucro (Prejuízo) Antes do IRPJ e CSLL"
    tipo: subtotal
    formula: "receita - deducao - custo - despesa - tributaria + outra_receita - outra_despesa + receita_financeira - despesa_financeira"

  # ── 13. Provisão para IRPJ e CSLL ────────────────────────
  provisao_irpj:
    label: "Provisão para IRPJ e CSLL"
    tipo: provisao_ir
    prefixos: []   # Não identificado nos balancetes do período

  # ── 14. Lucro (Prejuízo) Líquido do Período ──────────────
  lucro_liquido:
    label: "Lucro (Prejuízo) Líquido do Período"
    tipo: subtotal
    formula: "receita - deducao - custo - despesa - tributaria + outra_receita - outra_despesa + receita_financeira - despesa_financeira - provisao_ir"
