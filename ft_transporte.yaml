# Gerado com base nos balancetes: 12/2025, 01/2026, 02/2026 e 03/2026
#
# ATENÇÃO — Layout especial (fs_sequencial):
#   Diferente dos layouts Socium (pontos) e generico_hifen (hífens),
#   este plano de contas usa inteiros sequenciais simples como códigos.
#   Ex: sintético "3" (Disponível) pai de "4" (Caixa) e "7" (Bancos),
#   que por sua vez são pais de "5" (Caixa Geral), "3695" (Target) etc.
#
#   O prefixo simples NÃO funciona neste layout porque:
#     - "3" como prefixo capturaria 3695, 3719, 3749... (fornecedores!)
#     - "12" como prefixo capturaria 120, 121, 125, 129 (imobilizado!)
#     - "20" como prefixo capturaria 2017, 2023, 2026... (fornecedores!)
#
#   Solução: o campo `codigos` lista o CÓDIGO SINTÉTICO do grupo.
#   O engine deve tratar cada entrada como correspondência EXATA —
#   não como prefixo — para capturar o valor já agregado do grupo.
#
# Setor: Transporte Rodoviário de Cargas
# Observações contábeis:
#   - Frota expressiva: Veículos R$10.836.726,39D (bruto)
#   - Depreciação acumulada veículos: R$9.054.688,13C — valor líquido baixo
#   - Financiamentos: consórcios (Caixa, Volvo, Ancora, Randon, Safra,
#     Rodobens) e Empréstimos Caixa — todos no PC (cod 382)
