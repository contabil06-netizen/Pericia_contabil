# ------------------------------------------------------------
# ESTRUTURA DA DRE
#
# Para o DRE, os códigos dos grupos sintéticos funcionam como
# prefixos porque os filhos NÃO compartilham os mesmos dígitos
# iniciais. Ex: "296" (Despesas com Vendas) → filhos: 319, 320,
# 322, 325 — nenhum começa com "296". Prefixo funciona aqui.
#
# ALERTA: Conta de receita operacional de transporte NÃO
# identificada nos balancetes disponíveis (dez/2025–mar/2026).
# A única receita registrada é financeira (cod 430: R$59,02).
# Adicionar conta de receita principal quando identificada.
#
# Resultado acumulado mar/2026: R$150.857,25D (prejuízo)
# Composto por:
#   Despesas com Vendas (296): R$67.969,59D
#   Despesas Admin (329): R$82.375,55D
#   Custo Serviços (461): R$571,13D
#   Receitas Financeiras (430): R$59,02C
#
# tipo:
#   receita      → positivo, soma ao resultado
#   deducao      → negativo, reduz receita bruta
#   custo        → negativo, reduz resultado
#   despesa      → negativo, reduz resultado
#   outra_receita → receita fora da operação principal
# ------------------------------------------------------------
dre_estrutura:

  custo_servicos_prestados:
    label: "(-) Custo dos Serviços Prestados"
    tipo: custo
    prefixos:
      - "461"    # 461 — Custos dos Produtos e Serviços Vendidos
                 #   465 — Custos dos Serviços Prestados
                 #     466 — Custos dos Serviços Prestados
                 #       467 — Combustíveis e Lubrificantes
                 # Saldo mar/2026: R$571,13D (baixo — verificar se há
                 # custo de combustível sendo lançado em Fornecedores)

  despesas_com_vendas:
    label: "Despesas com Vendas"
    tipo: despesa
    prefixos:
      - "296"    # 296 — Despesas com Vendas
                 #   319 — Despesas Gerais
                 #     320 — Aluguéis (R$4.500,00D em mar/2026)
                 #     322 — Telefone (R$69,90D)
                 #     325 — Serviços Prestados por Terceiros (R$63.399,69D)
                 # Obs: "Serviços Prestados por Terceiros" aqui é expressivo
                 # — provável custo de subcontratação de fretes

  impostos_taxas:
    label: "Impostos, Taxas e Contribuições"
    tipo: despesa
    prefixos:
      - "345"    # 345 — Impostos, Taxas e Contribuições
                 #   352 — Multas de Mora (R$3.581,67D em mar/2026)

  despesas_gerais:
    label: "Despesas Gerais e Administrativas"
    tipo: despesa
    prefixos:
      - "353"    # 353 — Despesas Gerais (administrativas)
                 #   354 — Energia Elétrica (R$52,16D)
                 #   355 — Água e Esgoto (R$24,78D)
                 #   362 — Serviços Prestados por Terceiros (R$900,00D)
                 #   363 — Depreciações e Amortizações (R$76.276,61D — dominante)
                 # Obs: depreciação em mar/2026 = R$76.276,61D por mês

  despesas_financeiras:
    label: "Despesas Financeiras"
    tipo: despesa
    prefixos:
      - "367"    # 367 — Despesas Financeiras
                 #   574 — Tarifas Bancárias

  receitas_financeiras:
    label: "Receitas Financeiras"
    tipo: outra_receita
    prefixos:
      - "430"    # 430 — Receitas Financeiras
                 #   431 — Juros e Descontos
                 #     434 — Descontos Financeiros Obtidos (R$59,02C)
