#   - Parcelamentos tributários relevantes: ICMS (cod 3553) +
#     PGFN 3817734 (cod 3742) e PGFN 3817737 (cod 3743)
#     com redutora de juros/multas (cod 3601)
#   - Patrimônio Líquido NEGATIVO: Prejuízos Acumulados (cod 267)
#     de ~R$10,2M superam Capital Social de R$493.000,00
#   - Clientes (cod 504): ~R$832–959 mil — duplicatas a receber
#   - Títulos a Receber (cod 3719): R$1.265.564,13 — Conta Corrente Sul Minas
#   - Adiantamentos de Clientes (cod 554): R$1.671.357,22 — passivo relevante
#   - Depósitos Judiciais ANC (cod 82): R$363.733–363.789
#
# ALERTA — Sem receita operacional identificada:
#   Nos 4 meses lidos (dez/2025 a mar/2026), NÃO há conta de receita
#   de transporte/prestação de serviços com movimentação no balancete.
#   A única receita registrada é financeira mínima (cod 430/431/434:
#   "Descontos Financeiros Obtidos" = R$59,02).
#   Resultado composto integralmente por despesas. Verificar com o
#   escritório contábil se há conta de receita inativa ou se a
#   empresa está sem atividade operacional no período.
# ============================================================

cliente: "FT Transporte Ltda"
