# ------------------------------------------------------------
# ESTRUTURA DA DRE
# Prefixo raiz das receitas: 3
# Prefixo raiz das despesas: 4
#
# Ordem de apresentação:
#   Receita Bruta Vendas → Receita Bruta Serviços → Deduções →
#   Receitas Financeiras → CMV → Despesas Pessoal →
#   Serviços Terceiros → Localização/Manutenção → Veículos/Equip →
#   Comunicação → Depreciações → Despesas Financeiras →
#   Impostos e Contribuições
# ------------------------------------------------------------
dre_estrutura:

  receita_bruta_vendas:
    label: "Receita Bruta de Vendas de Mercadorias"
    tipo: receita
    prefixos:
      - "3-1-01-01"   # Receita sobre Vendas
                      # 3-1-01-01-01 — Venda de produtos

  receita_bruta_servicos:
    label: "Receita Bruta de Prestação de Serviços"
    tipo: receita
    prefixos:
      - "3-1-02-01"   # Receita de serviços
                      # 3-1-02-01-01 — Prestação de serviços

  deducoes_receita:
    label: "(-) Deduções da Receita Bruta"
    tipo: deducao
    prefixos:
      - "3-2-01"      # Dedução de receita sobre vendas
                      # 3-2-01-01-03 — ICMS
                      # 3-2-01-01-04 — PIS
                      # 3-2-01-01-05 — COFINS
                      # 3-2-01-01-06 — ISS
                      # 3-2-01-01-07 — IRPJ sobre Lucro Presumido (até dez/2025)
                      # 3-2-01-01-08 — CSLL sobre Lucro Presumido (até dez/2025)

  receitas_financeiras:
    label: "Receitas Financeiras"
    tipo: receita
    prefixos:
      - "3-3-02"      # Receita Financeira
                      # 3-3-02-05-01 — Juros

  custo_mercadorias_vendidas:
    label: "(-) Custo das Mercadorias Vendidas"
    tipo: custo
    prefixos:
      - "4-1-01"      # Custos de Mercadorias Vendidas
                      # 4-1-01-01-01 — Compras de mercadorias
                      # 4-1-01-01-02 — (-) ICMS (redutora, saldo credor)
                      # 4-1-01-01-03 — Estoque Inicial
                      # 4-1-01-01-04 — (-) Estoque Final (redutora, saldo credor)

  despesas_pessoal:
    label: "Despesas com Pessoal"
    tipo: despesa
    prefixos:
      - "4-3-01"      # Despesas com Pessoal
                      # 4-3-01-01-02 — Honorários Contábeis (gestores/contabilidade)
                      # 4-3-01-02-01 — Salários e Ordenados
                      # 4-3-01-02-02 — Férias
                      # 4-3-01-02-03 — 13º Salário
                      # 4-3-01-02-04 — INSS
                      # 4-3-01-02-05 — FGTS

  despesas_servicos_terceiros:
    label: "Serviços de Terceiros"
    tipo: despesa
    prefixos:
      - "4-3-02"      # Despesas com Serviços de Terceiros
                      # 4-3-02-01-02 — Honorários Contábeis
                      # 4-3-02-01-03 — Serviços de Terceiros
                      # 4-3-02-01-05 — Fretes e Carretos

  despesas_localizacao:
    label: "Despesas de Localização e Manutenção"
    tipo: despesa
    prefixos:
      - "4-3-03-01"   # Despesas com Localização e Manutenção
                      # 4-3-03-01-01 — Aluguel
                      # 4-3-03-01-02 — Material de Consumo
                      # 4-3-03-01-03 — Material de Expediente
                      # 4-3-03-01-04 — Água e Esgoto
                      # 4-3-03-01-05 — Conservação e Limpeza
                      # 4-3-03-01-06 — Energia Elétrica
                      # 4-3-03-01-07 — Despesas c/Segurança Empresarial
                      # 4-3-03-01-08 — Despesas c/Informática

  despesas_veiculos_equipamentos:
    label: "Despesas com Veículos e Equipamentos"
    tipo: despesa
    prefixos:
      - "4-3-03-03"   # Despesas com Utilização de Equipamentos e Veículos
                      # 4-3-03-03-03 — Manutenção de Veículos
                      # 4-3-03-03-04 — Combustíveis e Lubrificantes
                      # 4-3-03-03-05 — Despesas c/Peças para Máquinas e Equipamentos

  despesas_comunicacao:
    label: "Despesas com Comunicação e Marketing"
    tipo: despesa
    prefixos:
      - "4-3-03-04"   # Despesas com Comunicação
                      # 4-3-03-04-01 — Despesas c/Softwares
                      # 4-3-03-04-02 — Telefone e Internet
                      # 4-3-03-04-03 — Despesas c/Marketing

  depreciacoes:
