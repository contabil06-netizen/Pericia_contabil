                      # 4-5-04-01-02 — Despesas Financeiras de Encargos sobre Tributos

  impostos_contribuicoes:
    label: "Impostos, Contribuições e Taxas"
    tipo: despesa
    prefixos:
      - "4-3-05-02"   # Despesas com Contribuições e Donativos
                      # 4-3-05-02-04 — Impostos e Taxas
      - "4-4-01"      # Contribuições — a partir de mar/2026 (reclassificação)
                      # 4-4-01-02-01 — PIS/PASEP
                      # 4-4-01-02-02 — COFINS
                      # 4-4-01-02-05 — IRPJ
                      # 4-4-01-02-06 — CSLL
