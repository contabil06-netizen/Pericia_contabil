                      # 4-3-03-07-01 — Depreciações

  despesas_financeiras:
    label: "Despesas Financeiras"
    tipo: despesa
    prefixos:
      - "4-3-03-02"   # Despesas Financeiras (classificadas dentro de Desp. Administrativas)
                      # 4-3-03-02-03 — Despesas Bancárias
