# ------------------------------------------------------------
# ESTRUTURA DA DRE — espelha modelo preta e branca (linhas 01-14)
#
# Tipos utilizados:
#   receita            → receitas operacionais (sinal +1)
#   deducao            → deduções da receita (sinal -1)
#   custo              → CPV (sinal -1)
#   despesa            → despesas operacionais s/ tributárias (sinal -1)
#   tributaria         → despesas tributárias (sinal -1) — excluídas do EBITDA
#   outra_receita      → receitas não-operacionais (sinal +1)
#   outra_despesa      → outras despesas não-operacionais (sinal -1)
#   depreciacao        → addback de depreciação para EBITDA (sinal +1)
#   receita_financeira → receitas financeiras (sinal +1)
#   despesa_financeira → despesas financeiras (sinal -1)
#   provisao_ir        → IRPJ e CSLL (sinal -1)
#   subtotal           → linha calculada via formula
#   agrupador          → linha-mãe com subgrupos exibidos abaixo
#
# Nota sobre depreciação:
#   3.2.2.04.001 entra em "adm_gerais" (tipo despesa) E em
#   "depreciacao_amortizacao" (tipo depreciacao). Isso é correto:
#   a depreciação é debitada como despesa no resultado operacional
#   e adicionada de volta na linha 09 para chegar ao EBITDA.
# ------------------------------------------------------------
dre_estrutura:

  # ── 01. Receita Bruta ────────────────────────────────────
  receita_bruta:
    label: "Receita Bruta"
    tipo: agrupador
    subgrupos:
      receita_vendas:
        label: "Receita de Vendas"
        tipo: receita
        prefixos:
          - "4.1.1.01"   # (sem movimentação identificada no período)
      receita_servicos:
        label: "Receita de Serviços"
        tipo: receita
        prefixos:
          - "4.1.1.02"   # 4.1.1.02.000 - Serviços Prestados

  # ── 02. Deduções da Receita Bruta ────────────────────────
  deducoes_receita:
    label: "(-) Deduções da Receita Bruta"
    tipo: deducao
    prefixos:
      - "4.1.2"          # 4.1.2.03.000 - (-) ICMS

  # ── 03. Receita Operacional Líquida ──────────────────────
  receita_operacional_liquida:
    label: "Receita Operacional Líquida"
    tipo: subtotal
    formula: "receita - deducao"

  # ── 04. Custo Operacional ─────────────────────────────────
  custo_operacional:
    label: "Custo Operacional"
    tipo: agrupador
    subgrupos:
      cpv:
        label: "Custos dos Produtos Vendidos"
        tipo: custo
        prefixos:
          - "5.1.1"      # 5.1.1.01.000 - Custos dos Produtos Vendidos

  # ── 05. Lucro (Prejuízo) Bruto ───────────────────────────
  lucro_bruto:
    label: "Lucro (Prejuízo) Bruto"
    tipo: subtotal
    formula: "receita - deducao - custo"

  # ── 06. Despesas Operacionais ────────────────────────────
  despesas_operacionais:
    label: "Despesas Operacionais"
    tipo: agrupador
    subgrupos:
      trabalhistas:
        label: "Trabalhistas"
        tipo: despesa
        prefixos:
          - "3.2.2.01"   # Salários, Férias, INSS, FGTS, VT, VA, Faltas
      adm_gerais:
        label: "Administrativas e Gerais"
        tipo: despesa
        prefixos:
          - "3.2.2.04"   # Energia, Deprec./Amort., Associação, Manutenção
          - "3.2.2.05"   # Telefone, Internet
          - "3.2.2.06"   # Contabilidade, Advogados, Terceiros, Engenharia
      tributarias:
        label: "Tributárias"
        tipo: tributaria
        prefixos:
          - "3.2.2.03"   # Taxas Diversas, Multas de Mora, IMA (ABATE)

  # ── 07. Outras Receitas (Despesas) Operacionais ──────────
  outras_receitas_despesas:
    label: "Outras Receitas (Despesas) Operacionais"
    tipo: agrupador
    subgrupos:
      outras_receitas:
        label: "Outras Receitas"
        tipo: outra_receita
        prefixos:
          - "4.1.4"      # 4.1.4.00.001 - Recuperação de Despesa
          - "4.1.5"      # 4.1.5.01.000 - Arrendamentos
      outras_despesas:
        label: "Outras Despesas"
        tipo: outra_despesa
        prefixos: []     # sem movimentação identificada

  # ── 08. Resultado Operacional ────────────────────────────
  resultado_operacional:
    label: "Resultado Operacional"
    tipo: subtotal
    formula: "receita - deducao - custo - despesa - tributaria + outra_receita - outra_despesa"

  # ── 09. Depreciação / Amortização (addback p/ EBITDA) ────
  depreciacao_amortizacao:
    label: "Depreciação / Amortização"
    tipo: depreciacao
    prefixos:
      - "3.2.2.04.001"   # Depreciações e Amortizações (incluída em adm_gerais acima)

  # ── 10. EBITDA ───────────────────────────────────────────
  ebitda:
    label: "EBITDA"
    tipo: subtotal
    formula: "receita - deducao - custo - despesa + outra_receita - outra_despesa + depreciacao"

  # ── 11. Receitas (Despesas) Financeiras ──────────────────
  financeiras:
    label: "Receitas (Despesas) Financeiras"
    tipo: agrupador
    subgrupos:
      receitas_financeiras:
        label: "Receitas Financeiras"
        tipo: receita_financeira
        prefixos:
          - "4.1.3"      # 4.1.3.01.000 - Descontos Financeiros Obtidos
      despesas_financeiras:
        label: "Despesas Financeiras"
        tipo: despesa_financeira
        prefixos:
          - "3.2.2.08"   # 3.2.2.08.009 - Juros s/ Impostos

  # ── 12. Lucro (Prejuízo) Antes do IRPJ e CSLL ───────────
  antes_irpj:
    label: "Lucro (Prejuízo) Antes do IRPJ e CSLL"
    tipo: subtotal
    formula: "receita - deducao - custo - despesa - tributaria + outra_receita - outra_despesa + receita_financeira - despesa_financeira"

  # ── 13. Provisão para IRPJ e CSLL ────────────────────────
  provisao_irpj:
    label: "Provisão para IRPJ e CSLL"
    tipo: provisao_ir
    prefixos: []           # não identificado nos balancetes do período

  # ── 14. Lucro (Prejuízo) Líquido do Período ──────────────
  lucro_liquido:
    label: "Lucro (Prejuízo) Líquido do Período"
    tipo: subtotal
    formula: "receita - deducao - custo - despesa - tributaria + outra_receita - outra_despesa + receita_financeira - despesa_financeira - provisao_ir"
